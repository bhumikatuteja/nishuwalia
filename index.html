<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nishu Walia | Pet Parenting Educator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            scroll-behavior: smooth;
            width: 100%;
            overflow-x: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: fade-in-up 0.8s ease-out forwards; }
        
        .glow-shape {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .phone-frame {
            border: 6px solid #1a1a1a;
            border-radius: 2rem;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
            background: #000;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        /**
         * ------------------------------------------------------------------
         * CONFIGURATION SECTION
         * ------------------------------------------------------------------
         */
        const CONFIG = {
            profile: {
                name: "Nishu Walia",
                role: "Pet Parenting Educator",
                badge: "Research-Backed Awareness",
                heroImage: "https://images.unsplash.com/photo-1544568100-847a948585b9?auto=format&fit=crop&q=80&w=600",
                email: "nishuwalia.collab@gmail.com",
                instagram: "https://www.instagram.com/nishuwalia101/",
                youtube: "#",
                whatsapp: "#", 
                followers: "39.4K"
            },
            stats: [
                { label: 'Followers', value: 39000, suffix: '+', sub: 'Organic Base', icon: 'users' },
                { label: 'Monthly Reach', value: 1200000, suffix: '+', sub: 'Educational Impact', icon: 'trending-up' },
                { label: 'Saves', value: 250000, suffix: '+', sub: 'High Utility', icon: 'bookmark' },
                { label: 'Engagement', value: 5.2, suffix: '%', sub: 'Pure Trust', icon: 'heart' },
            ],
            demographics: {
                gender: [{ label: 'Female', value: 65 }, { label: 'Male', value: 35 }],
                age: [
                    { label: '18-24', value: 20 },
                    { label: '25-34', value: 55 },
                    { label: '35-44', value: 15 },
                    { label: '45+', value: 10 }
                ]
            },
            insights: [
                { label: 'Reach', url: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?auto=format&fit=crop&q=80&w=400', sub: 'Verified Data' },
                { label: 'Engagement', url: 'https://images.unsplash.com/photo-1551288049-bb8c803er9a2?auto=format&fit=crop&q=80&w=400', sub: 'High Intent' },
                { label: 'Growth', url: 'https://images.unsplash.com/photo-1543286386-713bdd548da4?auto=format&fit=crop&q=80&w=400', sub: 'Constant' }
            ],
            reels: [
                {
                    title: "Canine CPR: Step-by-Step",
                    reach: "850k+", saves: "40k", shares: "12k",
                    videoUrl: "https://assets.mixkit.co/videos/preview/mixkit-vet-examining-a-golden-retriever-4458-large.mp4",
                    instaLink: "https://www.instagram.com/nishuwalia101/",
                    tag: "Critical Guide"
                },
                {
                    title: "10 Hidden Kitchen Toxins",
                    reach: "1.2M", saves: "110k", shares: "45k",
                    videoUrl: "https://assets.mixkit.co/videos/preview/mixkit-dog-eating-from-a-bowl-4464-large.mp4",
                    instaLink: "https://www.instagram.com/nishuwalia101/",
                    tag: "Viral Impact"
                }
            ],
            packages: [
                {
                    title: "Agile Reach",
                    desc: "Interactive brand storytelling via multi-part story sequences for quick visibility.",
                    features: ["3x Multi-Part Stories", "Link Stickers", "Interactive Polls/Q&A"],
                    icon: 'zap',
                    tag: "Fast Track",
                    buttonText: "Inquire Now",
                    isPopular: false
                },
                {
                    title: "Trust Integration",
                    desc: "Strategic product alignment within high-authority awareness and safety guides.",
                    features: ["1x Educational Reel", "Pinned Link Strategy", "Story Amplification"],
                    icon: 'star',
                    tag: "High Impact",
                    buttonText: "Discuss Strategy",
                    isPopular: true
                },
                {
                    title: "Full Audit",
                    desc: "A scientific exploration of product utility and real-world impact for the Indian pet ecosystem.",
                    features: ["1x Dedicated Reel", "Link in Bio (15 Days)", "Raw Asset Rights"],
                    icon: 'file-video',
                    tag: "Authority",
                    buttonText: "Book Setup",
                    isPopular: false
                }
            ]
        };

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const useScrollReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) entry.target.classList.add('reveal');
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        };

        const CountUp = ({ end, duration = 2000, suffix = "" }) => {
            const [count, setCount] = useState(0);
            const ref = useRef(null);
            
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        let start = 0;
                        const increment = end / (duration / 16);
                        const timer = setInterval(() => {
                            start += increment;
                            if (start >= end) {
                                setCount(end);
                                clearInterval(timer);
                            } else {
                                setCount(Math.floor(start));
                            }
                        }, 16);
                    }
                }, { threshold: 0.5 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [end]);

            const format = (num) => {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
                if (num >= 1000) return (num / 1000).toFixed(0) + 'K';
                return num;
            };

            return <span ref={ref}>{format(count)}{suffix}</span>;
        };

        const SectionHeader = ({ label, title, sub }) => {
            const revealRef = useScrollReveal();
            return (
                <div className="text-center space-y-3 mb-10 px-4 opacity-0" ref={revealRef}>
                    <span className="text-emerald-600 font-black text-[10px] uppercase tracking-[0.4em] bg-emerald-50 px-3 py-1.5 rounded-full">{label}</span>
                    <h2 className="text-4xl sm:text-5xl font-black tracking-tighter italic text-slate-900 leading-tight uppercase">{title}</h2>
                    <p className="text-slate-400 max-w-xl mx-auto font-medium text-sm sm:text-base">{sub}</p>
                </div>
            );
        };

        const App = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isMuted, setIsMuted] = useState(true);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [formSubject, setFormSubject] = useState('');

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleInquiry = (e) => {
                e.preventDefault();
                setIsSubmitted(true);
                setTimeout(() => { setIsModalOpen(false); setIsSubmitted(false); }, 3000);
            };

            return (
                <div className="w-full overflow-hidden">
                    <div className="glow-shape top-0 left-[-150px]"></div>
                    <div className="glow-shape bottom-[20%] right-[-150px]"></div>

                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-white/90 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-6xl mx-auto px-4 flex justify-between items-center text-slate-900">
                            <div className="flex items-center gap-2">
                                <div className="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center text-emerald-400 shadow-lg">
                                    <Icon name="paw-print" size={20} />
                                </div>
                                <span className="font-black text-sm tracking-tighter uppercase hidden xs:block">{CONFIG.profile.name}</span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-10 font-bold text-[13px] uppercase tracking-widest text-slate-500">
                                <a href="#about" className="hover:text-emerald-600 transition-colors">About</a>
                                <a href="#analytics" className="hover:text-emerald-600 transition-colors">Audience</a>
                                <a href="#content" className="hover:text-emerald-600 transition-colors">Work</a>
                                <a href="#packages" className="hover:text-emerald-600 transition-colors">Packages</a>
                                <a href="#contact" className="hover:text-emerald-600 transition-colors">Contact</a>
                            </div>

                            <div className="flex items-center gap-3">
                                <button onClick={() => { setFormSubject('Collaboration'); setIsModalOpen(true); }} className="bg-emerald-600 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-slate-900 transition-all btn-glow text-white">
                                    Inquire
                                </button>
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden p-1 text-slate-900">
                                    <Icon name={isMenuOpen ? "x" : "menu"} size={24} />
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="about" className="pt-24 pb-16 px-4 bg-gradient-to-b from-emerald-50/50 to-white overflow-hidden">
                        <div className="max-w-6xl mx-auto flex flex-col items-center gap-10">
                            <div className="w-full max-w-[320px] sm:max-w-md">
                                <div className="relative group">
                                    <div className="absolute inset-0 bg-emerald-200 rounded-[2rem] rotate-3 scale-105 opacity-20 group-hover:rotate-6 transition-transform"></div>
                                    <img src={CONFIG.profile.heroImage} alt="Nishu" className="relative z-10 w-full h-auto object-cover rounded-[2rem] shadow-xl" />
                                </div>
                            </div>

                            <div className="w-full text-center space-y-6 text-slate-900">
                                <div className="space-y-3">
                                    <div className="flex items-center justify-center gap-2 text-emerald-600">
                                        <Icon name="shield-check" size={16} className="fill-emerald-600 text-emerald-600" />
                                        <span className="text-[10px] font-black uppercase tracking-[0.2em]">{CONFIG.profile.badge}</span>
                                    </div>
                                    <h1 className="text-4xl sm:text-7xl font-black tracking-tighter leading-tight text-slate-900">
                                        Educating <br/> <span className="text-emerald-600">Pet Parents.</span>
                                    </h1>
                                    <p className="text-sm sm:text-lg text-slate-400 font-bold uppercase tracking-[0.2em]">{CONFIG.profile.name} | {CONFIG.profile.role}</p>
                                </div>
                                <p className="text-slate-500 text-base sm:text-xl leading-relaxed font-medium max-w-2xl mx-auto">
                                    Elevating the standards of Indian pet care by transforming complex research into life-saving awareness for every home.
                                </p>
                                <div className="flex flex-col sm:flex-row justify-center gap-3">
                                    <button onClick={() => document.getElementById('packages').scrollIntoView()} className="bg-slate-900 text-white px-8 py-4 rounded-full font-black uppercase text-[11px] tracking-widest hover:bg-emerald-600 transition-all shadow-lg">Explore Packages</button>
                                </div>
                                <div className="flex items-center justify-center gap-2 text-slate-400 font-bold text-[10px] uppercase tracking-widest">
                                    <Icon name="check-circle-2" size={12} className="text-emerald-500" />
                                    Trusted by {CONFIG.profile.followers}+ Indian Pet Parents
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Performance Section */}
                    <section id="analytics" className="py-16 px-4 bg-white relative">
                        <div className="max-w-6xl mx-auto">
                            <SectionHeader label="Metrics" title="Impact" sub="Organic growth and high-trust engagement." />
                            
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-8 text-slate-900">
                                {CONFIG.stats.map((stat, idx) => (
                                    <div key={idx} className="bg-slate-50 p-6 sm:p-10 rounded-[2.5rem] text-center space-y-3 hover:-translate-y-2 transition-all border border-transparent hover:border-emerald-100 hover:bg-white shadow-sm">
                                        <div className="inline-flex items-center justify-center w-12 h-12 bg-white rounded-xl text-emerald-600 shadow-sm">
                                            <Icon name={stat.icon} size={22} />
                                        </div>
                                        <div className="text-2xl sm:text-4xl font-black text-slate-900 tracking-tighter">
                                            <CountUp end={stat.value} suffix={stat.suffix} />
                                        </div>
                                        <div>
                                            <div className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{stat.label}</div>
                                            <div className="text-[9px] font-bold text-emerald-600 uppercase">{stat.sub}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Demographics */}
                            <div className="mt-12 max-w-3xl mx-auto">
                                <div className="bg-slate-900 rounded-[2.5rem] p-8 sm:p-12 text-white space-y-8">
                                    <div className="flex items-center justify-between">
                                        <h3 className="text-lg font-black italic text-white">Audience Split</h3>
                                        <Icon name="users" className="text-emerald-400" />
                                    </div>
                                    <div className="space-y-8">
                                        <div className="space-y-3">
                                            <div className="flex justify-between text-[10px] font-black uppercase tracking-widest text-white">
                                                <span><Icon name="user" size={12} className="inline mr-1 text-emerald-400"/> Female</span>
                                                <span>65%</span>
                                            </div>
                                            <div className="h-3 w-full bg-white/10 rounded-full overflow-hidden relative">
                                                <div className="h-full bg-emerald-500 w-[65%] rounded-full shadow-[0_0_10px_rgba(16,185,129,0.4)]"></div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            {CONFIG.demographics.age.map((age, i) => (
                                                <div key={i} className="space-y-1.5 text-white">
                                                    <div className="flex justify-between text-[10px] font-black uppercase text-slate-400">
                                                        <span>Age {age.label}</span>
                                                        <span>{age.value}%</span>
                                                    </div>
                                                    <div className="h-1.5 w-full bg-white/10 rounded-full overflow-hidden">
                                                        <div className="h-full bg-emerald-400" style={{ width: `${age.value}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Insights Section */}
                    <section className="py-16 px-4 bg-slate-50 overflow-hidden text-slate-900">
                        <div className="max-w-6xl mx-auto">
                            <SectionHeader label="Social Proof" title="Proof" sub="Verified data directly from analytics." />
                            <div className="flex overflow-x-auto gap-5 no-scrollbar pb-6 px-4 snap-x">
                                {CONFIG.insights.map((item, i) => (
                                    <div key={i} className="min-w-[240px] sm:min-w-[280px] snap-center">
                                        <div className="phone-frame overflow-hidden aspect-[9/18]">
                                            <img src={item.url} alt={item.label} className="w-full h-full object-cover" />
                                        </div>
                                        <div className="mt-4 text-center">
                                            <div className="text-xs font-black uppercase text-slate-900">{item.label}</div>
                                            <div className="text-[9px] font-bold text-emerald-600 uppercase tracking-widest">{item.sub}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Viral Highlights */}
                    <section id="content" className="py-16 px-4 bg-white text-slate-900">
                        <div className="max-w-6xl mx-auto">
                            <SectionHeader label="Case Studies" title="Work" sub="Education translated into viral engagement." />
                            <div className="grid md:grid-cols-2 gap-8 lg:gap-16">
                                {CONFIG.reels.map((post, idx) => (
                                    <div key={idx} className="w-full max-w-[340px] mx-auto text-slate-900">
                                        <div className="phone-frame relative group cursor-pointer aspect-[9/16] overflow-hidden" onClick={() => window.open(post.instaLink, '_blank')}>
                                            <video autoPlay loop muted={isMuted} playsInline className="w-full h-full object-cover" src={post.videoUrl} />
                                            <div className="absolute top-6 right-6 text-white/40"><Icon name="instagram" size={20} /></div>
                                            <div className="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/80"></div>
                                            <button onClick={(e) => { e.stopPropagation(); setIsMuted(!isMuted); }} className="absolute top-6 left-6 p-3 bg-black/40 backdrop-blur-md rounded-full text-white z-10">
                                                <Icon name={isMuted ? "volume-x" : "volume-2"} size={16} />
                                            </button>
                                            <div className="absolute bottom-10 left-8 right-8 text-white space-y-3">
                                                <span className="px-3 py-1 bg-emerald-600 rounded-full text-[9px] font-black uppercase">{post.tag}</span>
                                                <h3 className="text-xl font-black italic">{post.title}</h3>
                                                <div className="flex justify-between items-center border-t border-white/20 pt-3 text-white">
                                                    <div className="text-center"><div className="text-lg font-black">{post.reach}</div><div className="text-[7px] uppercase opacity-60">Reach</div></div>
                                                    <div className="text-center"><div className="text-lg font-black">{post.saves}</div><div className="text-[7px] uppercase opacity-60">Saves</div></div>
                                                    <div className="text-center"><div className="text-lg font-black">{post.shares}</div><div className="text-[7px] uppercase opacity-60">Shares</div></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Packages Section */}
                    <section id="packages" className="py-16 px-4 bg-slate-50 text-slate-900">
                        <div className="max-w-6xl mx-auto">
                            <SectionHeader label="Collaboration" title="Packages" sub="Strategic options for Indian pet brands." />
                            <div className="grid md:grid-cols-3 gap-6 items-stretch">
                                {CONFIG.packages.map((pkg, i) => (
                                    <div key={i} className={`p-8 rounded-[2.5rem] flex flex-col transition-all relative ${pkg.isPopular ? 'bg-slate-900 text-white md:scale-105 z-10' : 'bg-white text-slate-900 shadow-sm'}`}>
                                        {pkg.isPopular && (
                                            <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-emerald-500 text-white text-[9px] font-black uppercase px-4 py-1.5 rounded-full shadow-lg">Most Popular</div>
                                        )}
                                        <div className="space-y-4 mb-8">
                                            <div className="flex justify-between items-center">
                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${pkg.isPopular ? 'bg-emerald-600' : 'bg-emerald-50 text-emerald-600'}`}><Icon name={pkg.icon} size={24} /></div>
                                                <span className="text-[8px] font-black uppercase opacity-60 tracking-widest">{pkg.tag}</span>
                                            </div>
                                            <h3 className={`text-xl font-black italic uppercase ${pkg.isPopular ? 'text-white' : 'text-slate-900'}`}>{pkg.title}</h3>
                                            <p className={`text-xs font-medium ${pkg.isPopular ? 'text-slate-300' : 'text-slate-500'}`}>{pkg.desc}</p>
                                        </div>
                                        <ul className="space-y-4 mb-8 flex-grow">
                                            {pkg.features.map((feat, fi) => (
                                                <li key={fi} className="flex items-center gap-3 text-[11px] font-bold">
                                                    <Icon name="check-circle-2" size={14} className="text-emerald-500" /> {feat}
                                                </li>
                                            ))}
                                        </ul>
                                        <button onClick={() => { setFormSubject(pkg.title); setIsModalOpen(true); }} className={`w-full py-4 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${pkg.isPopular ? 'bg-emerald-600 text-white' : 'bg-slate-900 text-white'}`}>
                                            {pkg.buttonText}
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer id="contact" className="py-16 px-4 bg-white border-t border-slate-100 text-slate-900">
                        <div className="max-w-4xl mx-auto text-center space-y-12">
                            <div className="space-y-4">
                                <h2 className="text-4xl sm:text-6xl font-black tracking-tighter italic text-slate-900 leading-none uppercase">Define the <span className="text-emerald-600">Standard.</span></h2>
                                <p className="text-slate-500 font-bold text-sm sm:text-lg uppercase tracking-widest px-4">Ready to initiate a strategic partnership?</p>
                                <span className="inline-block bg-emerald-50 text-emerald-700 text-[9px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Response within 4 hours</span>
                            </div>
                            <div className="space-y-10">
                                <a href={`mailto:${CONFIG.profile.email}`} className="text-xl sm:text-3xl font-black text-slate-900 underline decoration-emerald-200 underline-offset-8 hover:text-emerald-600 transition-all block break-all">{CONFIG.profile.email}</a>
                                <div className="flex flex-wrap justify-center gap-6">
                                    <a href={CONFIG.profile.instagram} className="flex flex-col items-center gap-2">
                                        <div className="p-4 bg-slate-50 rounded-full border border-slate-100 text-slate-900"><Icon name="instagram" size={20} /></div>
                                        <span className="text-[9px] font-black uppercase text-slate-900">{CONFIG.profile.followers}</span>
                                    </a>
                                    <a href={CONFIG.profile.whatsapp} className="flex flex-col items-center gap-2">
                                        <div className="p-4 bg-slate-50 rounded-full border border-slate-100 text-slate-900"><Icon name="message-circle" size={20} /></div>
                                        <span className="text-[9px] font-black uppercase text-slate-900">WhatsApp</span>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </footer>

                    {/* Mobile Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-40 bg-white pt-24 px-6 animate-in slide-in-from-top duration-300">
                            <div className="flex flex-col gap-6 text-xl font-black tracking-tight text-slate-900">
                                <a href="#about" onClick={() => setIsMenuOpen(false)} className="pb-4 border-b border-slate-100 flex justify-between items-center text-slate-900 uppercase">About <Icon name="chevron-right" size={20} className="text-emerald-600" /></a>
                                <a href="#analytics" onClick={() => setIsMenuOpen(false)} className="pb-4 border-b border-slate-100 flex justify-between items-center text-slate-900 uppercase">Audience <Icon name="chevron-right" size={20} className="text-emerald-600" /></a>
                                <a href="#content" onClick={() => setIsMenuOpen(false)} className="pb-4 border-b border-slate-100 flex justify-between items-center text-slate-900 uppercase">Work <Icon name="chevron-right" size={20} className="text-emerald-600" /></a>
                                <a href="#packages" onClick={() => setIsMenuOpen(false)} className="pb-4 border-b border-slate-100 flex justify-between items-center text-slate-900 uppercase">Packages <Icon name="chevron-right" size={20} className="text-emerald-600" /></a>
                                <a href="#contact" onClick={() => setIsMenuOpen(false)} className="pb-4 border-b border-slate-100 flex justify-between items-center text-slate-900 uppercase">Contact <Icon name="chevron-right" size={20} className="text-emerald-600" /></a>
                            </div>
                        </div>
                    )}

                    {/* Inquiry Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center px-4 text-slate-900">
                            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onClick={() => setIsModalOpen(false)}></div>
                            <div className="relative bg-white w-full max-w-lg rounded-[2rem] shadow-2xl p-6 sm:p-10 max-h-[90vh] overflow-y-auto">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-slate-900"><Icon name="x" size={24} /></button>
                                {!isSubmitted ? (
                                    <div className="space-y-6">
                                        <div><span className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">Partnership Intake</span><h2 className="text-xl font-black mt-1 uppercase">{formSubject || 'General Partnership'}</h2></div>
                                        <form onSubmit={handleInquiry} className="space-y-4">
                                            <input required name="name" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold text-slate-900" placeholder="Your Name" />
                                            <input required name="brand" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold text-slate-900" placeholder="Brand Entity" />
                                            <input required type="email" name="email" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold text-slate-900" placeholder="Official Email" />
                                            <textarea required name="message" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold h-24 text-slate-900" placeholder="Strategic Vision"></textarea>
                                            <button type="submit" className="w-full py-4 bg-emerald-600 text-white rounded-full font-black text-xs uppercase tracking-widest shadow-lg text-white">Submit Inquiry</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="py-10 text-center space-y-4">
                                        <div className="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto"><Icon name="check-circle-2" size={32} /></div>
                                        <h2 className="text-xl font-black">Inquiry Prepared!</h2>
                                        <p className="text-slate-500 text-sm">We will review your proposal shortly.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
